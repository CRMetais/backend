name: Deploy Backend para EC2 Privada
on:
  push:
    branches:
      - main
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven
        working-directory: ./cr-metais
        run: mvn clean package -DskipTests

      - name: Renomear JAR
        working-directory: ./cr-metais
        run: |
          JAR_NAME=$(find target -maxdepth 1 -name '*.jar' -not -name 'original-.jar' | head -n 1)
          echo "JAR encontrado: $JAR_NAME"
          mv "$JAR_NAME" target/api-cr-metais.jar
          echo "Renomeado para: target/api-cr-metais.jar"

      - name: Preparar destino na EC2 Pública
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            mkdir -p /home/ubuntu/backend
            rm -rf /home/ubuntu/backend/api-cr-metais.jar

      - name: Copiar JAR para EC2 Pública
        uses: easingthemes/ssh-deploy@main
        with:
          SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_KEY }}
          REMOTE_HOST: ${{ secrets.REMOTE_HOST }}
          REMOTE_USER: ubuntu
          TARGET: /home/ubuntu/backend/
          ARGS: "-ltgoDzvO"
          SOURCE: "./cr-metais/target/api-cr-metais.jar"

      - name: Mover para EC2 Privada e Reiniciar Serviço
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            ARQUIVO_PEM="/home/ubuntu/chavetmp.pem"
            rm -f $ARQUIVO_PEM
            echo "${{ secrets.EC2_SSH_KEY }}" > $ARQUIVO_PEM
            chmod 400 $ARQUIVO_PEM
            USUARIO_IP=ubuntu@${{ secrets.REMOTE_HOST_PRIVADO }}
            ssh -o StrictHostKeyChecking=no -i $ARQUIVO_PEM $USUARIO_IP \
              'mkdir -p /home/ubuntu/backend && rm -rf /home/ubuntu/backend/api-cr-metais.jar'
            scp -o StrictHostKeyChecking=no -i $ARQUIVO_PEM \
              /home/ubuntu/backend/api-cr-metais.jar \
              $USUARIO_IP:/home/ubuntu/backend/api-cr-metais.jar
            ssh -o StrictHostKeyChecking=no -i $ARQUIVO_PEM $USUARIO_IP \
              'file /home/ubuntu/backend/api-cr-metais.jar | grep -q "Java archive" || (echo "JAR corrompido!" && exit 1)'
            ssh -o StrictHostKeyChecking=no -i $ARQUIVO_PEM $USUARIO_IP \
              'docker compose -f /home/ubuntu/docker/compose-java-api.yml stop'
            ssh -o StrictHostKeyChecking=no -i $ARQUIVO_PEM $USUARIO_IP \
              'docker compose -f /home/ubuntu/docker/compose-java-api.yml rm -f backend'
            ssh -o StrictHostKeyChecking=no -i $ARQUIVO_PEM $USUARIO_IP \
              'docker compose -f /home/ubuntu/docker/compose-java-api.yml up -d --force-recreate backend > /tmp/api-cr-metais.log 2>&1'
            rm -f $ARQUIVO_PEM

      # ── NOVO: aguarda o backend responder e invoca a lambda_get_data ──────
      # Roda na EC2 pública, que já tem permissão IAM para invocar Lambdas.
      # O loop testa /api/dashboard via Nginx (porta 80) a cada 10s por até 5min.
      - name: Aguardar backend e invocar Lambda
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "Aguardando backend ficar pronto..."
            timeout 300 bash -c 'until curl -sf http://localhost/api/dashboard > /dev/null 2>&1; do echo "  waiting for backend..."; sleep 10; done'
            echo "Backend pronto! Invocando lambda_get_data..."
            aws lambda invoke \
              --function-name lambda_get_data \
              --region us-east-1 \
              --payload '{}' \
              /tmp/lambda_response.json
            cat /tmp/lambda_response.json
            echo "Lambda invocada com sucesso!"
