name: Deploy Backend JAR

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven
        working-directory: ./cr-metais
        run: mvn clean package -DskipTests

      - name: Push to Target Repo
        env:
          TARGET_TOKEN: ${{ secrets.TARGET_REPO_TOKEN }}
        run: |
            git clone https://x-access-token:${TARGET_TOKEN}@github.com/CRMetais/TF.git destino
            
            # Cria a pasta backend no destino e remove o JAR antigo (se existir)
            mkdir -p destino/backend
            rm -f destino/backend/*.jar
            
            # Busca qualquer arquivo .jar gerado dentro de pastas 'target' e copia para o destino
            find . -type f -name "*.jar" -path "*/target/*" -exec cp {} destino/backend/ \;
            
            cd destino
            git config user.name "GitHub Actions Bot"
            git config user.email "actions@github.com"
            git add backend/
            git commit -m "chore: update backend jar" || echo "No changes"
            git push origin main